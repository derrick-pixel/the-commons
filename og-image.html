<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 25%, #FFBA69 50%, #00D2FF 75%, #3A7BD5 100%);
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .float { position: absolute; font-size: 48px; opacity: 0.3; }
    .f1 { top: 8%; right: 8%; } .f2 { top: 25%; right: 28%; } .f3 { bottom: 15%; right: 12%; }
    .f4 { top: 15%; left: 8%; } .f5 { bottom: 20%; left: 15%; }
    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      color: white;
      padding: 60px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .logo-box {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 24px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    h1 {
      font-size: 64px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      max-width: 900px;
    }
    p {
      font-size: 22px;
      opacity: 0.9;
      max-width: 650px;
      margin: 0 auto 32px;
      line-height: 1.5;
    }
    .tags {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="float f1">&#127754;</div>
  <div class="float f2">&#127866;</div>
  <div class="float f3">&#127881;</div>
  <div class="float f4">&#9728;&#65039;</div>
  <div class="float f5">&#127926;</div>
  <div class="card">
    <div class="logo">
      <div class="logo-box">TC</div>
      <div class="logo-text">The Commons</div>
    </div>
    <h1>Gather. Fund. Celebrate.</h1>
    <p>Peer-to-peer event organisation with built-in escrow payments and a pro services marketplace.</p>
    <div class="tags">
      <span class="tag">&#128274; Escrow Payments</span>
      <span class="tag">&#127881; Group Events</span>
      <span class="tag">&#127775; Pro Marketplace</span>
    </div>
  </div>
</body>
</html>
