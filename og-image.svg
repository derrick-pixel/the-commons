<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="25%" style="stop-color:#FF8E53"/>
      <stop offset="50%" style="stop-color:#FFBA69"/>
      <stop offset="75%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#3A7BD5"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.06" fill="white">
    <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" transform="translate(100,50)"/>
    <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" transform="translate(300,150)"/>
    <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" transform="translate(800,80)"/>
    <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" transform="translate(1000,400)"/>
  </g>

  <!-- Floating emojis -->
  <text x="1050" y="100" font-size="48" opacity="0.3">&#127754;</text>
  <text x="150" y="150" font-size="42" opacity="0.25">&#9728;&#65039;</text>
  <text x="1000" y="350" font-size="44" opacity="0.25">&#127881;</text>
  <text x="100" y="500" font-size="40" opacity="0.2">&#127926;</text>
  <text x="950" y="550" font-size="38" opacity="0.2">&#127866;</text>

  <!-- Logo -->
  <rect x="490" y="120" width="56" height="56" rx="14" fill="url(#logo-bg)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="518" y="157" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="900" font-size="22" fill="white">TC</text>
  <text x="560" y="157" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="800" font-size="28" fill="white" letter-spacing="-1">The Commons</text>

  <!-- Main heading -->
  <text x="600" y="270" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="900" font-size="62" fill="white" letter-spacing="-2">Gather. Fund. Celebrate.</text>

  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.9)">Peer-to-peer event organisation with built-in escrow</text>
  <text x="600" y="360" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.9)">payments and a pro services marketplace.</text>

  <!-- Tags -->
  <g transform="translate(600, 420)">
    <!-- Tag 1 -->
    <rect x="-340" y="0" width="200" height="44" rx="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="-240" y="28" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="600" font-size="15" fill="white">&#128274; Escrow Payments</text>
    <!-- Tag 2 -->
    <rect x="-100" y="0" width="200" height="44" rx="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="0" y="28" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="600" font-size="15" fill="white">&#127881; Group Events</text>
    <!-- Tag 3 -->
    <rect x="140" y="0" width="210" height="44" rx="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="245" y="28" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="600" font-size="15" fill="white">&#127775; Pro Marketplace</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="500" font-size="16" fill="rgba(255,255,255,0.6)">thecommons.app</text>
</svg>
